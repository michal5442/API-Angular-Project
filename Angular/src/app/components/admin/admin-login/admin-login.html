<div class="admin-login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="logo-section">
        <mat-icon class="lock-icon">admin_panel_settings</mat-icon>
      </div>
      <mat-card-title>Admin Access</mat-card-title>
      <p class="subtitle">Enter your credentials to continue</p>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="onLogin()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Admin Password</mat-label>
          <input matInput type="password" [(ngModel)]="password" name="password" required />
          <mat-icon matPrefix>lock</mat-icon>
        </mat-form-field>
        
        <button mat-raised-button color="primary" type="submit" class="login-button">
          <span>Sign In</span>
          <mat-icon>arrow_forward</mat-icon>
        </button>
        
        <p class="error-message" *ngIf="errorMessage">
          <mat-icon>error</mat-icon>
          {{ errorMessage }}
        </p>
      </form>
    </mat-card-content>
  </mat-card>
</div>

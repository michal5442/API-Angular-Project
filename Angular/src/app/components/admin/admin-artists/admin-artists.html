<div class="admin-container">
  <div class="admin-header">
    <button mat-fab (click)="goBack()" class="back-button">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div class="header-content">
      <h1>Artists Management</h1>
      <p class="subtitle">Manage your artists collection</p>
    </div>
    <button mat-fab extended color="primary" (click)="openAddModal()" class="add-button">
      <mat-icon>add</mat-icon>
      Add Artist
    </button>
  </div>

  <div class="artists-grid">
    <mat-card class="artist-card" *ngFor="let artist of artists()">
      <mat-card-content>
        <div class="artist-info">
          <div class="artist-avatar">
            <mat-icon>person</mat-icon>
          </div>
          <div class="artist-details">
            <h3>{{ artist.name }}</h3>
            <p class="artist-id">ID: {{ artist.id }}</p>
            <div class="songs-badge">
              <mat-icon>music_note</mat-icon>
              <span>{{ artist.songsCount }} Songs</span>
            </div>
          </div>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-mini-fab color="primary" (click)="openEditModal(artist)" class="edit-btn">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-mini-fab color="warn" (click)="deleteArtist(artist.id)" class="delete-btn">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  <div class="modal" *ngIf="showModal" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ isEditMode ? 'Edit Artist' : 'Add New Artist' }}</h2>
        <button mat-icon-button (click)="closeModal()" class="close-btn">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <form (ngSubmit)="saveArtist()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Artist Name</mat-label>
          <input matInput [(ngModel)]="currentArtist.name" name="name" required />
          <mat-icon matPrefix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Image URL</mat-label>
          <input matInput [(ngModel)]="currentArtist.imageUrl" name="imageUrl" />
          <mat-icon matPrefix>image</mat-icon>
        </mat-form-field>

        <div class="modal-actions">
          <button mat-stroked-button type="button" (click)="closeModal()">Cancel</button>
          <button mat-raised-button color="primary" type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="admin-container">
  <div class="admin-header">
    <button mat-fab (click)="goBack()" class="back-button">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div class="header-content">
      <h1>Users Management</h1>
      <p class="subtitle">View and manage platform users</p>
    </div>
    <div class="spacer"></div>
  </div>

  <div class="users-grid">
    <mat-card class="user-card" *ngFor="let user of users()">
      <mat-card-content>
        <div class="user-info">
          <div class="user-avatar">
            <mat-icon>account_circle</mat-icon>
          </div>
          <div class="user-details">
            <h3>{{ user.firstName }} {{ user.lastName }}</h3>
            <p class="username">@{{ user.userName }}</p>
            <p class="user-id">ID: {{ user.id }}</p>
          </div>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-mini-fab color="warn" (click)="deleteUser(user.id)" class="delete-btn">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>

<div class="cart-container">
  <h1>Shopping Cart</h1>
  
  @if (cartItems().length === 0) {
    <div class="empty-cart">
      <mat-icon>shopping_cart</mat-icon>
      <p>Your cart is empty</p>
    </div>
  } @else {
    <div class="cart-items">
      @for (item of cartItems(); track item.id) {
        <mat-card class="cart-item">
          <div class="item-content">
            <img [src]="item.imageUrl && item.imageUrl.length > 0 ? 'https://localhost:44393/' + item.imageUrl : 'https://placehold.co/100x100/4B2152/white?text=No+Image'" 
                 [alt]="item.songName" 
                 class="item-image"
                 (error)="$event.target.src='https://placehold.co/100x100/4B2152/white?text=No+Image'">
            <button mat-mini-fab class="play-btn-cart" (click)="togglePlay(item)">
              <mat-icon>{{ currentPlayingId() === item.id ? 'pause' : 'play_arrow' }}</mat-icon>
            </button>
            <div class="item-details">
              <h3>{{ item.songName }}</h3>
              <p class="artist">{{ item.artist }}</p>
            </div>
            <div class="item-price">
              <span class="price">${{ item.price }}</span>
            </div>
            <button mat-icon-button class="remove-btn" (click)="removeFromCart(item.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </mat-card>
      }
    </div>
    
    <audio #audioPlayer (ended)="onSongEnded()"></audio>
    
    <mat-card class="cart-summary">
      <div class="summary-content">
        <h2>Total: ${{ totalPrice() }}</h2>
        <button mat-raised-button class="checkout-btn" (click)="checkout()">
          <mat-icon>payment</mat-icon>
          Proceed to Checkout
        </button>
      </div>
    </mat-card>
  }
</div>

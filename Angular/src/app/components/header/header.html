<mat-toolbar class="header-toolbar">
  <div class="header-content">
    
    <!-- Logo - Right Side with Background -->
    <div class="logo-section">
      <mat-icon class="logo-icon">play_circle</mat-icon>
      <span class="logo-text">MY Music</span>
    </div>

    <!-- Search Section -->
    <div class="search-section">
      <div class="search-container">
        <input 
          type="text"
          class="search-input"
          placeholder="What do you want to hear..."
          [value]="searchQuery()"
          (input)="searchQuery.set($any($event.target).value)"
          (keyup.enter)="onSearch()"
        />
        <button mat-icon-button class="search-btn" (click)="onSearch()">
          <mat-icon>search</mat-icon>
        </button>
      </div>
    </div>

    <!--Navigation Menu-->
    <nav class="nav-menu">
      <a mat-button routerLink="/" class="nav-link">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </a>
      <a mat-button routerLink="/favorites" class="nav-link">
        <mat-icon>favorite</mat-icon>
        <span>Favorites</span>
      </a>
      <a mat-button routerLink="/artists" class="nav-link">
        <mat-icon>person</mat-icon>
        <span>Artists</span>
      </a>
      <a mat-button routerLink="/songs" class="nav-link">
        <mat-icon>music_note</mat-icon>
        <span>Songs</span>
      </a>
      <a mat-button routerLink="/about" class="nav-link">
        <mat-icon>info</mat-icon>
        <span>About</span>
      </a>
      <a mat-button routerLink="/contact" class="nav-link">
        <mat-icon>contact_mail</mat-icon>
        <span>Contact</span>
      </a>
    </nav>

    <!-- Action Icons - Left Side -->
    <div class="action-icons">
      <button 
        mat-icon-button 
        (click)="onCart()" 
        [matBadge]="cartItemsCount()" 
        matBadgeColor="warn"
        class="action-btn"
      >
        <mat-icon>shopping_cart</mat-icon>
      </button>
      
      @if (isLoggedIn()) {
        <button 
          mat-icon-button 
          (click)="onProfile()" 
          class="action-btn"
        >
          <mat-icon>account_circle</mat-icon>
        </button>
      }
      
      <button 
        mat-icon-button 
        routerLink="/admin-login" 
        class="action-btn admin-btn"
        matTooltip="Admin"
      >
        <mat-icon>admin_panel_settings</mat-icon>
      </button>
      
      <button 
        mat-raised-button 
        (click)="onLoginLogout()" 
        class="login-btn"
      >
        <mat-icon>{{ isLoggedIn() ? 'logout' : 'login' }}</mat-icon>
        <span>{{ isLoggedIn() ? 'Logout' : 'Login' }}</span>
      </button>
    </div>

  </div>
</mat-toolbar>

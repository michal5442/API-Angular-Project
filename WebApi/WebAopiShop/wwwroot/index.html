<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>כניסה למערכת</title>
    <script src="script.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #f5f7fa;
            display: flex;
            font-family: 'Heebo', Arial, sans-serif;
        }

        /* פאנל צד */
        .side-panel {
            width: 45%;
            background: linear-gradient(160deg, #4f46e5 0%, #7c3aed 60%, #a855f7 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: white;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .side-panel .logo { font-size: 3.5rem; margin-bottom: 24px; }

        .side-panel h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }

        .side-panel p {
            font-size: 1.05rem;
            opacity: 0.85;
            text-align: center;
            line-height: 1.8;
            max-width: 300px;
        }

        .side-dots { display: flex; gap: 8px; margin-top: 50px; }
        .side-dots span {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
        }
        .side-dots span.active {
            background: white;
            width: 28px;
            border-radius: 5px;
        }

        /* פאנל טופס */
        .form-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
        }

        .form-box { width: 100%; max-width: 400px; }

        .form-box h2 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        /* טאבים */
        .tabs {
            display: flex;
            background: #ededf5;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 11px;
            border: none;
            background: transparent;
            border-radius: 9px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Heebo', Arial, sans-serif;
        }

        .tab-btn.active {
            background: white;
            color: #4f46e5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .panel { display: none; }
        .panel.active { display: block; }

        /* שדות */
        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 7px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #111827;
            background: white;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: 'Heebo', Arial, sans-serif;
        }

        input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
        }

        input::placeholder { color: #9ca3af; }

        /* כפתורים */
        .btn-main {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 6px;
            font-family: 'Heebo', Arial, sans-serif;
        }

        .btn-main:hover {
            background: linear-gradient(135deg, #4338ca, #6d28d9);
            box-shadow: 0 6px 20px rgba(79,70,229,0.35);
            transform: translateY(-1px);
        }

        .btn-outline {
            width: 100%;
            padding: 12px;
            background: white;
            color: #4f46e5;
            border: 1.5px solid #c7d2fe;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
            font-family: 'Heebo', Arial, sans-serif;
        }

        .btn-outline:hover { background: #f5f3ff; border-color: #4f46e5; }

        /* חוזק סיסמא */
        .strength-wrap { margin-bottom: 14px; }

        .strength-label {
            font-size: 0.82rem;
            color: #6b7280;
            margin-bottom: 6px;
            display: block;
        }

        progress {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            border: none;
            background: #e5e7eb;
            overflow: hidden;
        }

        progress::-webkit-progress-bar { background: #e5e7eb; }
        progress::-webkit-progress-value {
            background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981);
            transition: width 0.4s ease;
        }
        progress::-moz-progress-bar {
            background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981);
        }

        /* קישור מעבר */
        .switch-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 0.88rem;
            color: #6b7280;
        }

        .switch-hint a {
            color: #4f46e5;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .switch-hint a:hover { text-decoration: underline; }

        .msg {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 14px;
            text-align: center;
        }

        .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

        @media (max-width: 768px) { .side-panel { display: none; } }
    </style>
</head>
<body>

    <div class="side-panel">
        <div class="logo">🎵</div>
        <h1>ברוכים הבאים</h1>
        <p>פלטפורמת המוזיקה שלך — האזן, גלה ותהנה מאלפי שירים בכל זמן ומכל מקום.</p>
        <div class="side-dots">
            <span class="active"></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="form-panel">
        <div class="form-box">
            <h2 id="form-title">שלום, נעים להכיר 👋</h2>
            <p class="subtitle" id="form-subtitle">הכנס את הפרטים שלך כדי להתחבר</p>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login', this)">כניסה</button>
                <button class="tab-btn" onclick="switchTab('register', this)">הרשמה</button>
            </div>

            <!-- כניסה -->
            <div id="login" class="panel active">
                <div class="field">
                    <label for="e_userName">אימייל</label>
                    <input type="email" id="e_userName" placeholder="example@email.com" required />
                </div>
                <div class="field">
                    <label for="e_password">סיסמא</label>
                    <input type="password" id="e_password" placeholder="הכנס סיסמא" required />
                </div>
                <div id="msg-login" class="msg" style="display:none"></div>
                <button class="btn-main" onclick="Login()">התחברות</button>
                <div class="switch-hint">
                    עדיין אין לך חשבון?
                    <a onclick="switchTab('register', document.querySelectorAll('.tab-btn')[1])">הרשם עכשיו</a>
                </div>
            </div>

            <!-- הרשמה -->
            <div id="register" class="panel">
                <div class="field">
                    <label for="userName">אימייל</label>
                    <input type="email" id="userName" name="userName" placeholder="example@email.com" required />
                </div>
                <div class="field">
                    <label for="firstName">שם פרטי</label>
                    <input type="text" id="firstName" name="firstName" placeholder="ישראל" required />
                </div>
                <div class="field">
                    <label for="lastName">שם משפחה</label>
                    <input type="text" id="lastName" name="lastName" placeholder="ישראלי" required />
                </div>
                <div class="field">
                    <label for="password">סיסמא</label>
                    <input type="password" id="password" name="password" placeholder="לפחות 8 תווים" required />
                </div>
                <div class="strength-wrap">
                    <span class="strength-label">חוזק סיסמא</span>
                    <progress value="0" max="1"></progress>
                </div>
                <button class="btn-outline" onclick="CheckPassword()">בדוק חוזק סיסמא</button>
                <div id="msg-register" class="msg" style="display:none"></div>
            <button class="btn-main" onclick="Register()">יצירת חשבון</button>
                <div class="switch-hint">
                    כבר יש לך חשבון?
                    <a onclick="switchTab('login', document.querySelectorAll('.tab-btn')[0])">התחבר</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const titles = {
            login:    { h: 'שלום, נעים להכיר 👋',  sub: 'הכנס את הפרטים שלך כדי להתחבר' },
            register: { h: 'צור חשבון חדש ✨',      sub: 'הצטרף אלינו — זה לוקח פחות מדקה' }
        };

        function switchTab(panel, btn) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(panel).classList.add('active');
            btn.classList.add('active');
            document.getElementById('form-title').textContent = titles[panel].h;
            document.getElementById('form-subtitle').textContent = titles[panel].sub;
        }
    </script>
</body>
</html>
